name:                pithia-client
version:             0.1.0.0
github:              "farrellm/pithia"
license:             BSD-3-Clause
author:              "Matthew Farrell"
maintainer:          "farrellm@alum.mit.edu"
copyright:           "2026 Matthew Farrell"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/farrellm/pithia-client#readme>

dependencies:
- base >= 4.7 && < 5

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  dependencies:
  - pithia-core
  - aeson
  - cases
  - conduit
  - http-conduit
  - servant
  - servant-client
  - text
  - transformers
  - vector

executables:
  pithia-client-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - pithia-core
    - pithia-client
    - text
    - transformers

tests:
  pithia-client-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - pithia-client
